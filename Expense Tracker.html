<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Leak Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .total-box {
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #2ecc71;
        }
        .expense-list {
            list-style-type: none;
            padding: 0;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>
    
    <div class="total-box">
        Total Spent: <span id="total-amount">0</span> EGP
    </div>

    <form id="expense-form">
        <input type="number" id="amount" placeholder="Amount in EGP" required>
        <select id="category" required>
            <option value="" disabled selected>Select Category</option>
            <option value="Transportation (Uber/Swvl)">Transportation (Uber/Swvl)</option>
            <option value="Groceries">Groceries</option>
            <option value="Outings/Dining">Outings/Dining</option>
            <option value="valU Installment">valU Installment</option>
            <option value="Wife Allowance">Wife Allowance</option>
            <option value="Debt Repayment">Debt Repayment</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="description" placeholder="Short Description (e.g., Uber to work)" required>
        <button type="submit">Add Expense</button>
    </form>

    <ul class="expense-list" id="expense-list"></ul>
</div>

<script>
    const form = document.getElementById('expense-form');
    const amountInput = document.getElementById('amount');
    const categoryInput = document.getElementById('category');
    const descriptionInput = document.getElementById('description');
    const expenseList = document.getElementById('expense-list');
    const totalAmountSpan = document.getElementById('total-amount');

    // Load expenses from Local Storage
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    function updateUI() {
        expenseList.innerHTML = '';
        let total = 0;

        expenses.forEach((expense, index) => {
            total += parseFloat(expense.amount);
            
            const li = document.createElement('li');
            li.className = 'expense-item';
            li.innerHTML = `
                <div>
                    <strong>${expense.amount} EGP</strong> - ${expense.category}<br>
                    <small>${expense.description} (${expense.date})</small>
                </div>
                <button class="delete-btn" onclick="deleteExpense(${index})">X</button>
            `;
            expenseList.appendChild(li);
        });

        totalAmountSpan.innerText = total.toFixed(2);
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const newExpense = {
            amount: amountInput.value,
            category: categoryInput.value,
            description: descriptionInput.value,
            date: new Date().toLocaleDateString()
        };

        expenses.push(newExpense);
        localStorage.setItem('expenses', JSON.stringify(expenses));
        
        amountInput.value = '';
        categoryInput.value = '';
        descriptionInput.value = '';
        
        updateUI();
    });

    function deleteExpense(index) {
        expenses.splice(index, 1);
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI();
    }

    // Initialize the app
    updateUI();
</script>

</body>
</html>
